<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Spirit (Web RPG)</title>

    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0;
            background-color: #120c1f; /* ธีมกลางคืนสไตล์เกม RPG */
            color: #e2caff;
            display: flex; flex-direction: column; align-items: center;
            min-height: 110vh; overflow-x: hidden;
            user-select: none;
        }
        .container {
            padding: 15px; text-align: center; width: 100%; max-width: 400px; box-sizing: border-box;
        }

        /* ─── หน้าตั้งค่ากล้องวงกลม (แก้ปัญหาหน้าบีบ) ─── */
        #cameraSetup { margin-top: 20px; }
        .camera-circle {
            width: 170px; height: 170px;
            border-radius: 50%;
            border: 3px dashed #794bb0;
            overflow: hidden;
            margin: 0 auto 20px auto;
            background: #000;
            box-shadow: 0 0 20px rgba(121, 75, 176, 0.4);
        }
        .camera-circle video {
            width: 100%; height: 100%;
            object-fit: cover; /* บังคับครอปภาพให้สมส่วน ไม่บีบหน้า */
        }
        .btn-start-game {
            background: linear-gradient(180deg, #ff477e 0%, #d81159 100%);
            color: white; border: none; padding: 14px 25px; font-size: 16px; font-weight: bold;
            border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0 #8f0032;
        }

        /* ─── หน้าจอเกมแฟนตาซี ─── */
        #fantasyGameUI {
            display: none;
            background-color: #26183b;
            border: 3px solid #5c3882;
            border-radius: 16px;
            padding: 15px;
            margin-top: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 8px 25px rgba(0,0,0,0.8);
        }

        /* หลอดพลัง RPG */
        .stat-box {
            background: rgba(0, 0, 0, 0.4); border: 1px solid #4a286e; padding: 8px 12px; border-radius: 8px; margin-bottom: 15px;
        }
        .stat-row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: bold; margin: 4px 0; }
        .bar-track { width: 68%; background: #0b0514; height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid #3d1e5e; }
        .bar-fill { height: 100%; transition: width 0.4s ease; }
        .fill-hp { background: linear-gradient(90deg, #ff0055, #ff5500); width: 100%; }
        .fill-eat { background: linear-gradient(90deg, #ffaa00, #ffee00); width: 50%; }
        .fill-happy { background: linear-gradient(90deg, #00aaee, #00ffaa); width: 50%; }

        /* ตัวมอนสเตอร์ */
        .stage-area { height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        @keyframes floatSprite {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.03); }
        }
        #petSprite {
            font-size: 80px; 
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.8));
            animation: floatSprite 3s infinite ease-in-out;
            cursor: pointer;
            /* ป้องกัน iOS เด้งเมนู Copy/Look Up ตอนกดค้างเด็ดขาด! */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }

        /* กล่องข้อความแบบ Final Fantasy */
        .dialogue-box {
            background: #170e24; border: 2px solid #5c3882; border-radius: 6px; padding: 8px; font-size: 11px; color: #a3e5ff; min-height: 28px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px;
        }

        /* ปุ่มกดเล่นเกม */
        .action-btns { display: flex; justify-content: space-between; }
        .btn-rpg {
            background: #3c245c; border: 2px solid #6b429e; color: #ffdaf8; padding: 10px 4px; border-radius: 8px; font-weight: bold; font-size: 11px; flex: 1; margin: 0 4px; box-shadow: 0 3px 0 #1b0e2b; cursor: pointer;
        }
        .btn-rpg:active { transform: translateY(2px); box-shadow: 0 1px 0 #1b0e2b; }

        /* โซนซ่อนไฟล์วิดีโอ */
        #resultArea { display: none; margin-top: 15px; background: #170e24; padding: 15px; border-radius: 12px; border: 1px solid #ff0055; }
        .download-btn { display: inline-block; background: #00e5ff; color: #000; text-decoration: none; padding: 12px 18px; border-radius: 8px; font-weight: bold; font-size: 13px; margin-top: 10px; box-shadow: 0 0 15px rgba(0,229,255,0.4); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="cameraSetup">
        <h2 style="margin-bottom: 5px;">Spirit Summoner</h2>
        <p style="font-size:11px; color:#885bb5; margin-top:0;">(จัดตำแหน่งหน้าให้อยู่ในวงแหวนเวทมนตร์)</p>
        
        <div class="camera-circle">
            <video id="preview" autoplay muted playsinline></video>
        </div>

        <button id="startBtn" class="btn-start-game">✨ ทำพันธสัญญา (เข้าสู่โลกเกม)</button>
    </div>

    <div id="fantasyGameUI">
        <div class="stat-box">
            <div class="stat-row"><span>Lv.<span id="g_lv">1</span> <span id="g_name">สไลม์ปริศนา</span></span> <span style="color:#ff477e">EXP: <span id="g_exp">0</span>/40</span></div>
            <div class="stat-row"><span>พลังเวท (HP)</span> <div class="bar-track"><div class="bar-fill fill-hp" id="bar_hp"></div></div></div>
            <div class="stat-row"><span>ความอิ่ม (EAT)</span> <div class="bar-track"><div class="bar-fill fill-eat" id="bar_eat"></div></div></div>
            <div class="stat-row"><span>อารมณ์ (JOY)</span> <div class="bar-track"><div class="bar-fill fill-happy" id="bar_happy"></div></div></div>
        </div>
        
        <div class="stage-area">
            <div id="petSprite">💧</div>
        </div>

        <div class="dialogue-box" id="g_msg">"สไลม์น้อยจ้องมองคุณด้วยดวงตาใสแจ๋ว..."</div>

        <div class="action-btns">
            <button class="btn-rpg" onclick="feed()">🍓 ป้อนเบอร์รี</button>
            <button class="btn-rpg" onclick="play()">🪄 หยอกล้อ</button>
            <button class="btn-rpg" onclick="heal()">💖 ชำระล้าง</button>
        </div>
    </div>

    <div id="resultArea">
        <h3 style="color:#00ffaa; margin:0 0 10px 0;">✔ สิ้นสุดพันธสัญญา (บันทึกเสร็จสิ้น)</h3>
        <video id="recordedPlayback" controls playsinline style="width:100%; border-radius:8px; background:#000; max-height:35vh;"></video>
        <br>
        <a id="manualDownload" class="download-btn" href="#">📥 กดค้างที่นี่ -> เลือก "ดาวน์โหลดไฟล์ที่ลิงก์"</a>
    </div>

</div>

<script>
    var mediaRecorder, recordedChunks = [], stream, wakeLock = null;
    var preview = document.getElementById('preview');
    var cameraSetup = document.getElementById('cameraSetup');
    var fantasyGameUI = document.getElementById('fantasyGameUI');
    var resultArea = document.getElementById('resultArea');
    var manualDownload = document.getElementById('manualDownload');
    var startBtn = document.getElementById('startBtn');
    var petSprite = document.getElementById('petSprite');

    // ─── GAME SYSTEM ───
    var petExp = 0, petLv = 1, hp = 100, eat = 50, joy = 50;
    var gameTick;

    function updateUI() {
        document.getElementById('g_lv').innerText = petLv;
        document.getElementById('g_exp').innerText = petExp;
        document.getElementById('bar_hp').style.width = hp + '%';
        document.getElementById('bar_eat').style.width = eat + '%';
        document.getElementById('bar_happy').style.width = joy + '%';

        if(petLv === 1) { petSprite.innerText = "💧"; document.getElementById('g_name').innerText = "หยดน้ำแห่งจิต"; }
        else if(petLv === 2) { petSprite.innerText = "🦊"; document.getElementById('g_name').innerText = "จิ้งจอกพฤกษา"; }
        else if(petLv === 3) { petSprite.innerText = "🐲"; document.getElementById('g_name').innerText = "มังกรดารา"; }
    }

    function say(txt) { document.getElementById('g_msg').innerText = txt; }

    function feed() {
        eat = Math.min(100, eat + 25); petExp += 15; checkEvolve();
        say("ง่ำๆๆ! พลังเวทในตัวเพิ่มขึ้น! (EXP +15)"); updateUI();
    }
    function play() {
        joy = Math.min(100, joy + 25); eat = Math.max(0, eat - 10); petExp += 20; checkEvolve();
        say("มอนสเตอร์กระโดดโลดเต้นอย่างร่าเริง! (EXP +20)");
        petSprite.style.transform = "scale(1.25)"; setTimeout(function(){ petSprite.style.transform = "scale(1)"; }, 200);
        updateUI();
    }
    function heal() {
        hp = Math.min(100, hp + 30); say("✨ แสงสีทองเยียวยาบาดแผลทั้งหมด!"); updateUI();
    }

    function checkEvolve() {
        if(petExp >= 100 && petLv === 2) { petLv = 3; say("⚡ อัศจรรย์! จิ้งจอกพัฒนาร่างเป็น 'มังกรดารา'!"); }
        else if(petExp >= 40 && petLv === 1) { petLv = 2; say("🌟 วิ้งงง! หยดน้ำกลายร่างเป็น 'จิ้งจอกพฤกษา'!"); }
    }

    async function requestWakeLock() { try { if ('wakeLock' in navigator && navigator.wakeLock) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} }
    function releaseWakeLock() { if (wakeLock) { wakeLock.release(); wakeLock = null; } }

    // ─── เริ่มอัด & เข้าเกม ───
    startBtn.addEventListener('click', async function() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            preview.srcObject = stream;

            var options = {};
            if (typeof MediaRecorder.isTypeSupported === 'function' && MediaRecorder.isTypeSupported('video/mp4')) options = { mimeType: 'video/mp4' };

            mediaRecorder = new MediaRecorder(stream, options);
            recordedChunks = [];

            mediaRecorder.ondataavailable = function(e) { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = function() {
                var blob = new Blob(recordedChunks, { type: 'video/mp4' });
                document.getElementById('recordedPlayback').src = URL.createObjectURL(blob);

                var reader = new FileReader();
                reader.readAsDataURL(blob); 
                reader.onloadend = function() {
                    manualDownload.href = reader.result;
                    manualDownload.download = 'Archive_' + Math.floor(Date.now()/1000) + '.mp4';
                    fantasyGameUI.style.display = 'none';
                    resultArea.style.display = 'block';
                    window.scrollTo(0, document.body.scrollHeight);
                };
            };

            mediaRecorder.start();
            await requestWakeLock();

            cameraSetup.style.display = 'none';
            fantasyGameUI.style.display = 'block';
            updateUI();

            gameTick = setInterval(function(){
                eat = Math.max(0, eat - 3); joy = Math.max(0, joy - 2);
                if(eat === 0 || joy === 0) hp = Math.max(0, hp - 5);
                updateUI();
            }, 3500);

        } catch (err) { alert('กล้องมีปัญหา: ' + err.message); }
    });

    // ─── [ระบบลับ]: ตรวจจับการกดค้างที่มอนสเตอร์ ───
    var secretPressTimer = null;
    var isPressing = false;
    var pressStartTime = 0;

    function engageSecretTrigger(e) {
        e.preventDefault(); // บล็อกเมนูเด้งของ iOS
        isPressing = true;
        pressStartTime = Date.now();
        
        // มอนสเตอร์จะเรืองแสงสีชมพูอ่อนๆ เป็นสัญญาณเตือนให้ 'เรารู้กันแค่ 2 คน' ว่ากำลังนับถอยหลัง
        petSprite.style.filter = "drop-shadow(0 0 15px #ff007f) brightness(1.3)";

        secretPressTimer = setTimeout(function() {
            if(isPressing) {
                // *** สั่งปิดระบบอัดลับๆ ตรงนี้! ***
                clearInterval(gameTick);
                if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
                releaseWakeLock();
            }
        }, 2200); // ต้องกดแช่นิ่งๆ 2.2 วินาทีเป๊ะ
    }

    function disengageSecretTrigger(e) {
        if(!isPressing) return;
        isPressing = false;
        clearTimeout(secretPressTimer);
        petSprite.style.filter = "drop-shadow(0 8px 6px rgba(0,0,0,0.8))";

        // ถ้าปล่อยนิ้วเร็วไป (กดไม่ถึง 0.4 วินาที) ให้ถือว่าเป็นการ 'กดจิ้มเล่นธรรมดา'
        var holdTime = Date.now() - pressStartTime;
        if(holdTime < 400) {
            say("♪ มอนสเตอร์ชอบให้คุณลูบหัวจัง~");
        }
    }

    petSprite.addEventListener('touchstart', engageSecretTrigger, { passive: false });
    petSprite.addEventListener('touchend', disengageSecretTrigger);
    petSprite.addEventListener('touchcancel', disengageSecretTrigger);
    petSprite.addEventListener('mousedown', engageSecretTrigger);
    petSprite.addEventListener('mouseup', disengageSecretTrigger);
</script>
</body>
</html>
