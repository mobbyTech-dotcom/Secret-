<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>RETRO-GOTCHI (1996)</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #08080a; /* พื้นหลังดำสนิทกลืนกับจอ OLED */
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 120dvh; overflow-x: hidden;
            user-select: none; -webkit-user-select: none;
        }

        /* ─── 1. หน้า Setup ยืนยันตัวตน (กลม) ─── */
        #cameraSetup {
            width: 100%; max-width: 400px; padding: 30px 20px; text-align: center; color: white; font-family: sans-serif;
        }
        .cam-preview-circle {
            width: 180px; height: 180px; border-radius: 50%; border: 3px solid #00ffcc; overflow: hidden; margin: 0 auto 25px auto; box-shadow: 0 0 25px rgba(0,255,204,0.4); background: #111;
        }
        .cam-preview-circle video { width: 100%; height: 100%; object-fit: cover; }
        .btn-power {
            background: #ff0055; color: white; border: none; padding: 16px 0; width: 100%; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 6px 0 #990033;
        }

        /* ─── 2. โซนเครื่องเล่นทามาก็อตจิ (ตบตา) ─── */
        #tamagotchiDevice {
            display: none; flex-direction: column; align-items: center; margin-top: 15px;
        }

        /* ห่วงพวงกุญแจด้านบน */
        .keychain-ring {
            width: 28px; height: 45px; border: 5px solid #silver; border-color: #d6d6d6 #999 #999 #d6d6d6; border-radius: 14px / 22px; margin-bottom: -14px; z-index: 2;
        }

        /* บอดี้ทรงไข่ (Tamagotchi Egg Shell) */
        .tama-shell {
            width: 320px; height: 430px;
            background: radial-gradient(circle at 40% 30%, #ff5e97, #e6004c); /* สีชมพูพลาสติกยุค 90 */
            border-radius: 160px 160px 130px 130px / 210px 210px 160px 160px; /* สัดส่วนไข่เป๊ะๆ */
            border: 6px solid #2b000f;
            box-shadow: inset -12px -12px 20px rgba(0,0,0,0.4), inset 10px 10px 25px rgba(255,255,255,0.5), 0 20px 40px rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center; padding: 35px 25px 25px 25px; box-sizing: border-box; position: relative;
        }

        /* กรอบจอขาวๆ ด้านใน */
        .tama-screen-bezel {
            width: 220px; height: 185px; background: #f0f0f0; border-radius: 20px; border: 3px solid #2b000f; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); position: relative;
        }

        /* ตัวหน้าจอ LCD จริงๆ */
        .tama-lcd {
            width: 175px; height: 135px;
            background-color: #7bb241; /* สีเขียวจอเครื่องคิดเลขยุคเก่า */
            border: 2px solid #3d5c20; border-radius: 4px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
            padding: 6px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
            color: #1b330a; font-family: 'Press Start 2P', monospace; font-size: 8px;
        }

        /* แถบไอคอนบน-ล่าง ในจอ */
        .lcd-icons-row { display: flex; justify-content: space-between; font-size: 7px; font-weight: bold; }
        .icon-item { padding: 1px 2px; }
        .icon-active { background: #1b330a; color: #7bb241; }

        /* เวทีตรงกลางจอ */
        .lcd-center-stage { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #petSprite { font-size: 32px; transition: transform 0.1s; cursor: pointer; -webkit-touch-callout: none; }
        #poopSprite { font-size: 16px; position: absolute; bottom: 2px; right: 10px; display: none; }

        /* แถบข้อความสถานะด้านล่างสุดของจอ LCD */
        #tamaStatusConsole { font-size: 7px; text-align: center; border-top: 1px solid rgba(27,51,10,0.2); padding-top: 3px; height: 8px; }

        /* ─── 3 ปุ่มกดฮาร์ดแวร์ (A, B, C) ─── */
        .hardware-buttons { display: flex; justify-content: space-between; width: 190px; margin-top: 35px; }
        .btn-abc {
            width: 38px; height: 38px; background: #fffde0; border-radius: 50%; border: 4px solid #2b000f; box-shadow: 0 4px 0 #59001d, inset -2px -2px 4px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'Press Start 2P', monospace; font-size: 10px; color: #59001d; font-weight: bold;
        }
        .btn-abc:active { transform: translateY(4px); box-shadow: 0 0 0 #59001d; }

        /* ─── 3. โซนรับของกลาง (ซ่อนไว้) ─── */
        #resultArea { display: none; width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; color: white; font-family: sans-serif; text-align: center; }
        .download-btn { display: block; background: #00ffcc; color: black; padding: 16px; border-radius: 12px; font-weight: bold; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="cameraSetup">
        <h2 style="margin-top:0;">SYSTEM CHECK</h2>
        <div class="cam-preview-circle"><video id="preview" autoplay muted playsinline></video></div>
        <button id="startBtn" class="btn-power">▶ POWER ON (INSERT COIN)</button>
    </div>

    <div id="tamagotchiDevice">
        <div class="keychain-ring"></div>
        
        <div class="tama-shell">
            <span style="font-family:'Press Start 2P', monospace; font-size:9px; color:#59001d; margin-bottom:10px;">RETRO-GOTCHI</span>

            <div class="tama-screen-bezel">
                <div class="tama-lcd">
                    <div class="lcd-icons-row">
                        <span class="icon-item" id="ic_feed">FOOD</span>
                        <span class="icon-item" id="ic_light">LAMP</span>
                        <span class="icon-item" id="ic_play">PLAY</span>
                        <span class="icon-item" id="ic_med">PILL</span>
                    </div>

                    <div class="lcd-center-stage">
                        <div id="petSprite">(•ω•)</div>
                        <div id="poopSprite">~@~</div>
                    </div>

                    <div id="tamaStatusConsole">IDLE...</div>

                    <div class="lcd-icons-row">
                        <span class="icon-item" id="ic_clean">DUCK</span>
                        <span class="icon-item" id="ic_stat">STAT</span>
                        <span class="icon-item" id="ic_scold">SCOLD</span>
                        <span class="icon-item" style="opacity:0.2">ATTN</span>
                    </div>
                </div>
            </div>

            <div class="hardware-buttons">
                <div class="btn-abc" onclick="tamaAct('A')">A</div>
                <div class="btn-abc" onclick="tamaAct('B')">B</div>
                <div class="btn-abc" onclick="tamaAct('C')">C</div>
            </div>
        </div>
    </div>

    <div id="resultArea">
        <h3 style="color:#00ffcc;">บันทึกวิดีโอเสร็จสมบูรณ์!</h3>
        <video id="recordedPlayback" controls playsinline style="width:100%; border-radius:12px; background:#000;"></video>
        <a id="manualDownload" class="download-btn" href="#">📥 กดค้างที่นี่ -> เลือก "ดาวน์โหลดไฟล์ที่ลิงก์"</a>
    </div>

<script>
    let mediaRecorder, recordedChunks = [], stream;
    const preview = document.getElementById('preview');
    const cameraSetup = document.getElementById('cameraSetup');
    const tamagotchiDevice = document.getElementById('tamagotchiDevice');
    const resultArea = document.getElementById('resultArea');
    const petSprite = document.getElementById('petSprite');
    const poopSprite = document.getElementById('poopSprite');
    const statusConsole = document.getElementById('tamaStatusConsole');

    // ─── TAMAGOTCHI OS LOGIC ───
    let isPoopy = false, hunger = 3;
    let animTick;

    // อนิเมชั่นหายใจ (สลับข้อความทุก 600ms)
    const petFrames = ["( •ω• )", "(  •ω• )"];
    let fIdx = 0;
    function startIdleAnim() {
        animTick = setInterval(() => {
            fIdx = 1 - fIdx;
            petSprite.innerText = petFrames[fIdx];
        }, 600);
    }

    function printConsole(txt) {
        statusConsole.innerText = txt;
    }

    // แมปปุ่ม A, B, C ให้ใช้งานได้จริง
    function tamaAct(btn) {
        if(btn === 'A') { // ปุ่ม A: ให้อาหาร
            hunger++;
            clearInterval(animTick);
            petSprite.innerText = "( ºั~ºั )"; // ทำหน้าเคี้ยว
            printConsole("EATING...");
            setTimeout(() => { startIdleAnim(); printConsole("HAPPY!"); }, 1200);
        }
        if(btn === 'B') { // ปุ่ม B: เล่นกระโดด
            petSprite.style.transform = "translateY(-12px) scale(1.1)";
            printConsole("JUMP!");
            setTimeout(() => { petSprite.style.transform = "none"; printConsole("IDLE..."); }, 300);
        }
        if(btn === 'C') { // ปุ่ม C: ล้างอึ
            if(isPoopy) {
                isPoopy = false; poopSprite.style.display = "none";
                printConsole("FLUSHED!");
            } else { printConsole("CLEAN ALREADY"); }
        }
    }

    // ─── สั่งเปิดกล้อง ───
    document.getElementById('startBtn').addEventListener('click', async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1080 }, height: { ideal: 1920 } }, 
                audio: true 
            });
            preview.srcObject = stream;

            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/mp4' });
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                document.getElementById('recordedPlayback').src = URL.createObjectURL(blob);
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    document.getElementById('manualDownload').href = reader.result;
                    document.getElementById('manualDownload').download = 'Tama_REC_' + Date.now() + '.mp4';
                    tamagotchiDevice.style.display = 'none';
                    resultArea.style.display = 'block';
                };
            };

            mediaRecorder.start();

            cameraSetup.style.display = 'none';
            tamagotchiDevice.style.display = 'flex';
            startIdleAnim();

            // จำลองให้มันแอบ 'อึ' หลังผ่านไป 12 วินาที (เพิ่มความสมจริง)
            setTimeout(() => { isPoopy = true; poopSprite.style.display = "block"; }, 12000);

            // กระตุ้น Safari ให้หดบาร์
            setTimeout(() => window.scrollTo({ top: 40, behavior: 'smooth' }), 500);

        } catch (err) { alert('Camera Error: ' + err.message); }
    });

    // ─── [THE ULTIMATE ALIBI]: ระบบกดค้างที่ตัวทามาก็อตจิ ───
    let holdTimer = null;
    let saveProgress = 0;

    function engageSecretSave(e) {
        e.preventDefault();
        saveProgress = 0;
        clearInterval(animTick);
        
        // มอนสเตอร์ทำหน้าตกใจ
        petSprite.innerText = "( ºΔº )"; 
        printConsole("SYS.SAVE: 0%");

        holdTimer = setInterval(() => {
            saveProgress += 25;
            printConsole(`SYS.SAVE: ${saveProgress}%`);

            if(saveProgress >= 100) {
                clearInterval(holdTimer);
                printConsole("ROM WRITTEN!");
                // สั่งคัท! ปิดการอัดลับๆ
                if(mediaRecorder) mediaRecorder.stop();
                if(stream) stream.getTracks().forEach(t => t.stop());
            }
        }, 550); // กดค้าง 550ms * 4 รอบ = 2.2 วินาทีเป๊ะ
    }

    function abortSecretSave() {
        clearInterval(holdTimer);
        if(saveProgress > 0 && saveProgress < 100) {
            // ถ้าปล่อยมือกลางคัน ให้ขึ้นว่า SAVE ABORTED (โคตรเนียน!)
            printConsole("SAVE ABORTED");
            setTimeout(() => { startIdleAnim(); printConsole("IDLE..."); }, 1000);
        } else {
            startIdleAnim();
        }
        saveProgress = 0;
    }

    petSprite.addEventListener('pointerdown', engageSecretSave);
    petSprite.addEventListener('pointerup', abortSecretSave);
    petSprite.addEventListener('pointerleave', abortSecretSave);
</script>
</body>
</html>
