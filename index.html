<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>BIT-PET</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #121316; color: #a1a1aa;
  font-family: 'Courier New', Courier, monospace; font-weight: bold;
  min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center;
  overflow-x: hidden;
  user-select: none; -webkit-user-select: none;
}

/* ─── SETUP ─── */
#setupScreen {
  width: 100%; max-width: 400px;
  padding: 60px 24px 40px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.cam-circle {
  width: 180px; height: 180px; border-radius: 50%;
  border: 3px dashed #10b981; overflow: hidden;
  background: #000; box-shadow: 0 0 30px rgba(16,185,129,0.2);
}
.cam-circle video { width: 100%; height: 100%; object-fit: cover; }
.setup-title { color: #34d399; font-size: 22px; }
.setup-sub { font-size: 12px; color: #52525b; text-align: center; }
.btn-rec {
  width: 100%; padding: 18px;
  background: #10b981; color: #000;
  border: none; border-radius: 16px;
  font-size: 16px; font-weight: bold; font-family: inherit;
  cursor: pointer; box-shadow: 0 6px 0 #065f46;
  transition: transform .1s;
}
.btn-rec:active { transform: translateY(3px); box-shadow: 0 3px 0 #065f46; }
#noSupport { display:none; color:#ef4444; font-size:13px; text-align:center; padding: 0 10px; }

/* ─── GAME ─── */
#gameScreen {
  display: none;
  width: 100%; max-width: 420px;
  padding: 0 16px 40px;
  flex-direction: column; gap: 12px;
}

/* แถบ REC — มองเห็นตลอดเวลา */
.rec-bar {
  width: 100%;
  background: #18181b; border: 2px solid #ef4444;
  border-radius: 16px; padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 16px;
}
.rec-dot {
  display: inline-block; width: 10px; height: 10px;
  background: #ef4444; border-radius: 50%;
  animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.2; } }
.rec-label { color: #ef4444; font-size: 13px; letter-spacing: 1px; }
.rec-timer { color: #fff; font-size: 14px; font-variant-numeric: tabular-nums; }
.btn-stop {
  background: #ef4444; color: #fff;
  border: none; border-radius: 10px;
  padding: 6px 12px; font-size: 12px;
  font-family: inherit; font-weight: bold; cursor: pointer;
}

/* HUD */
.hud-top {
  background: #18181b; border: 2px solid #27272a;
  padding: 12px 16px; border-radius: 18px;
  display: flex; justify-content: space-between; align-items: center;
}
.pet-name { color: #34d399; font-size: 14px; }
.stat-group { display: flex; gap: 12px; font-size: 12px; }
.stat-group span { color: #fff; }

/* Stage */
.stage-area {
  background: #18181b; border: 2px solid #27272a;
  border-radius: 22px; height: 240px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
}
#petHitbox {
  padding: 36px; cursor: pointer;
  display: flex; justify-content: center; align-items: center;
  -webkit-touch-callout: none;
}
.pixel-art {
  width: 110px; height: 110px;
  shape-rendering: crispEdges;
  filter: drop-shadow(0 8px 8px rgba(0,0,0,0.8));
  transition: transform 0.1s ease;
}
@keyframes gentleFloat { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
.floating { animation: gentleFloat 2s infinite ease-in-out; }

/* Dialogue */
.dialogue-box {
  background: #18181b; border: 2px solid #27272a;
  padding: 12px 16px; border-radius: 14px;
  font-size: 12px; color: #34d399; text-align: center; min-height: 20px;
}

/* Buttons */
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.game-btn {
  background: #27272a; border: 2px solid #3f3f46;
  color: #f4f4f5; padding: 15px 0; border-radius: 14px;
  font-family: inherit; font-weight: bold; font-size: 13px;
  cursor: pointer; box-shadow: 0 4px 0 #0a0a0a;
}
.game-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0a0a0a; }

/* ─── RESULT ─── */
#resultScreen {
  display: none;
  width: 100%; max-width: 400px;
  padding: 60px 24px 40px;
  flex-direction: column; align-items: center; gap: 16px;
  text-align: center;
}
.result-title { color: #34d399; font-size: 18px; }
#recordedPlayback { width: 100%; border-radius: 16px; background: #000; }
.dl-btn {
  display: block; width: 100%;
  background: #34d399; color: #000;
  padding: 18px; border-radius: 16px;
  font-weight: bold; font-size: 15px;
  text-decoration: none; font-family: inherit;
}
.btn-again {
  width: 100%; padding: 14px;
  background: #27272a; color: #f4f4f5;
  border: 2px solid #3f3f46; border-radius: 14px;
  font-family: inherit; font-weight: bold; font-size: 14px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- ─── SETUP ─── -->
<div id="setupScreen">
  <div class="cam-circle"><video id="preview" autoplay muted playsinline></video></div>
  <div class="setup-title">BIT-PET REC</div>
  <div class="setup-sub">กดปุ่มด้านล่างเพื่อเริ่มบันทึกวิดีโอ<br>สัญลักษณ์ 🔴 REC จะแสดงตลอดเวลาที่อัดอยู่</div>
  <button class="btn-rec" id="startBtn">🔴 เริ่มบันทึก</button>
  <div id="noSupport">⚠️ เบราว์เซอร์นี้ไม่รองรับการบันทึกวิดีโอ<br>กรุณาใช้ Safari เวอร์ชันล่าสุด (iOS 14.3+)</div>
</div>

<!-- ─── GAME ─── -->
<div id="gameScreen">

  <!-- แถบ REC มองเห็นตลอด -->
  <div class="rec-bar">
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="rec-dot"></span>
      <span class="rec-label">REC</span>
    </div>
    <span class="rec-timer" id="recTimer">00:00</span>
    <button class="btn-stop" id="stopBtn">■ หยุดอัด</button>
  </div>

  <div class="hud-top">
    <span class="pet-name">โกมอน (GOMON)</span>
    <div class="stat-group">
      <div>อิ่ม: <span id="s_eat">75</span>%</div>
      <div>สุข: <span id="s_fun">80</span>%</div>
    </div>
  </div>

  <div class="stage-area">
    <div id="petHitbox">
      <svg class="pixel-art floating" id="petSvg" viewBox="0 0 16 16">
        <path fill="#10b981" d="M6,2 h4 v1 h2 v1 h1 v4 h-1 v1 h1 v3 h-1 v1 h-1 v1 h-5 v-1 h-1 v-1 h-1 v-3 h1 v-1 h1 v-3 h1 z"/>
        <path fill="#ffffff" d="M7,8 h3 v4 h-4 v-1 h-1 v-2 h2 z"/>
        <rect fill="#000000" x="10" y="4" width="1" height="2"/>
        <rect fill="#ef4444" x="11" y="7" width="1" height="1"/>
      </svg>
    </div>
  </div>

  <div class="dialogue-box" id="consoleText">"โกมอนกำลังแกว่งหางไปมาอย่างอารมณ์ดี..."</div>

  <div class="btn-grid">
    <button class="game-btn" onclick="act('feed')">🍖 ป้อนน่องไก่</button>
    <button class="game-btn" onclick="act('play')">⚽ เตะบอล</button>
    <button class="game-btn" onclick="act('clean')">🧹 อาบน้ำ</button>
    <button class="game-btn" onclick="act('sleep')">💤 ปิดไฟนอน</button>
  </div>

</div>

<!-- ─── RESULT ─── -->
<div id="resultScreen">
  <div class="result-title">✔ บันทึกเสร็จสิ้น</div>
  <video id="recordedPlayback" controls playsinline></video>
  <a id="dlBtn" class="dl-btn" href="#">📥 ดาวน์โหลดวิดีโอ</a>
  <button class="btn-again" id="againBtn">🔄 อัดใหม่</button>
</div>

<script>
  var mediaRecorder, recordedChunks = [], stream;
  var recSeconds = 0, recInterval = null, hungerInterval = null;
  var eat = 75, fun = 80;

  var $ = function(id){ return document.getElementById(id); };

  // ─── เช็ค support ───
  if (!window.MediaRecorder || !navigator.mediaDevices) {
    $('startBtn').style.display = 'none';
    $('noSupport').style.display = 'block';
  }

  // ─── เลือก mimeType ที่ Safari รองรับ ───
  function getBestMime() {
    var types = [
      'video/mp4;codecs=avc1',
      'video/mp4',
      'video/webm;codecs=vp8',
      'video/webm'
    ];
    for (var i = 0; i < types.length; i++) {
      if (MediaRecorder.isTypeSupported(types[i])) return types[i];
    }
    return '';
  }

  // ─── format timer ───
  function formatTime(s) {
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  // ─── เริ่มอัด ───
  $('startBtn').addEventListener('click', async function() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width: { ideal: 480 },
          height: { ideal: 640 },
          frameRate: { ideal: 15 }
        },
        audio: true
      });

      $('preview').srcObject = stream;

      var mime = getBestMime();
      var opts = { videoBitsPerSecond: 800000 };
      if (mime) opts.mimeType = mime;

      mediaRecorder = new MediaRecorder(stream, opts);
      recordedChunks = [];

      mediaRecorder.ondataavailable = function(e) {
        if (e.data && e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.onstop = function() {
        var finalMime = mime || 'video/mp4';
        var blob = new Blob(recordedChunks, { type: finalMime });
        var url = URL.createObjectURL(blob);
        $('recordedPlayback').src = url;

        var reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = function() {
          var dl = $('dlBtn');
          dl.href = reader.result;
          dl.download = 'BIT-PET_' + Date.now() + '.mp4';
        };

        showScreen('result');
      };

      mediaRecorder.start(1000);

      // เริ่มนับเวลา
      recSeconds = 0;
      $('recTimer').textContent = '00:00';
      recInterval = setInterval(function() {
        recSeconds++;
        $('recTimer').textContent = formatTime(recSeconds);
      }, 1000);

      // ระบบหิวตามเวลา
      hungerInterval = setInterval(function() {
        eat = Math.max(0, eat - 1);
        fun = Math.max(0, fun - 1);
        updateStat();
      }, 5000);

      showScreen('game');

    } catch (err) {
      alert('ไม่สามารถเปิดกล้องได้: ' + err.message);
    }
  });

  // ─── หยุดอัด ───
  $('stopBtn').addEventListener('click', function() {
    stopRecording();
  });

  function stopRecording() {
    clearInterval(recInterval);
    clearInterval(hungerInterval);
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    if (stream) stream.getTracks().forEach(function(t){ t.stop(); });
  }

  // ─── อัดใหม่ ───
  $('againBtn').addEventListener('click', function() {
    recordedChunks = [];
    eat = 75; fun = 80; updateStat();
    $('consoleText').textContent = '"โกมอนกำลังแกว่งหางไปมาอย่างอารมณ์ดี..."';
    showScreen('setup');
  });

  // ─── สลับหน้า ───
  function showScreen(name) {
    $('setupScreen').style.display  = name === 'setup'  ? 'flex' : 'none';
    $('gameScreen').style.display   = name === 'game'   ? 'flex' : 'none';
    $('resultScreen').style.display = name === 'result' ? 'flex' : 'none';
    window.scrollTo(0, 0);
  }

  // ─── เกมโกมอน ───
  function updateStat() {
    $('s_eat').textContent = eat;
    $('s_fun').textContent = fun;
  }

  function act(type) {
    var svg = $('petSvg');
    svg.style.transform = 'scale(1.2)';
    setTimeout(function(){ svg.style.transform = 'none'; }, 150);

    if (type === 'feed')  { eat = Math.min(100, eat+20); $('consoleText').textContent = '냠냠! น่องไก่อร่อยที่สุดในโลก! (+20 อิ่ม)'; }
    if (type === 'play')  { fun = Math.min(100, fun+20); eat = Math.max(0, eat-10); $('consoleText').textContent = '♪ โกมอนวิ่งไล่ลูกบอลอย่างสนุกสนาน!'; }
    if (type === 'clean') { $('consoleText').textContent = '✨ ตัวหอมฟุ้งเหมือนแป้งเด็ก!'; }
    if (type === 'sleep') { $('consoleText').textContent = '💤 โกมอนสัปหงก... (Zzz)'; }
    updateStat();
  }

  // ─── ลูบหัวโกมอน ───
  var hitbox = $('petHitbox');
  hitbox.addEventListener('click', function() {
    fun = Math.min(100, fun + 5);
    updateStat();
    $('consoleText').textContent = '♪ โกมอนชอบให้คุณลูบหัวจัง~';
  });
</script>
</body>
</html>
