<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Pocket Spirit (Web PWA)</title>

    <style>
        body {
            background-color: #0d0e12; /* สีเทาดำสไตล์แอปยุคใหม่ กลืนกับจอ OLED */
            color: #c7d0e5;
            font-family: 'Courier New', Consolas, monospace; font-weight: bold;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            /* ตั้งความสูง 110dvh เพื่อให้ 'ไถจอขึ้น' สั่งซ่อนบาร์ Safari ได้ */
            min-height: 110dvh; 
            overflow-x: hidden;
            user-select: none; -webkit-user-select: none;
        }

        /* ─── 1. หน้า Setup ก่อนเริ่ม (เช็คหน้าตรง) ─── */
        #cameraSetup {
            width: 100%; max-width: 400px; padding: 30px 20px; text-align: center; margin-top: 30px; box-sizing: border-box;
        }
        .cam-circle {
            width: 200px; height: 200px; border-radius: 50%; border: 3px solid #ffcc00; overflow: hidden; margin: 0 auto 25px auto; box-shadow: 0 0 30px rgba(255,204,0,0.3); background: #111;
        }
        .cam-circle video { width: 100%; height: 100%; object-fit: cover; }
        .btn-start {
            background: linear-gradient(135deg, #ff9900, #ff5500); color: white; border: none; padding: 18px 0; width: 100%; border-radius: 16px; font-size: 16px; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 0 8px 20px rgba(255,85,0,0.4);
        }

        /* ─── 2. หน้าจอเกมเลี้ยงสัตว์ (กางเต็ม Safe-Area ของจอ) ─── */
        #petGameWorld {
            display: none;
            width: 100%; max-width: 440px;
            height: 90dvh; /* สัดส่วนพอดีใต้ Dynamic Island และเหนือ Pill-URL */
            box-sizing: border-box;
            padding: 15px 20px;
            flex-direction: column; justify-content: space-between;
        }

        /* ส่วนหัว: หลอดพลัง */
        .hud-panel {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding: 14px 18px; border-radius: 20px; backdrop-filter: blur(10px);
        }
        .stat-line { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin: 8px 0; }
        .bar-bg { width: 65%; background: rgba(0,0,0,0.6); height: 12px; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .bar-fill { height: 100%; transition: width 0.3s ease; }

        /* ส่วนกลาง: เวทีแสดงตัวสัตว์เลี้ยง */
        .stage-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
        }
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
        }
        #petHitbox {
            /* ขยายพื้นที่รับคำสั่งแตะให้ใหญ่ๆ ป้องกันนิ้วหลุดตอนกดค้าง */
            padding: 30px; 
            cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            -webkit-touch-callout: none;
        }
        #petSprite {
            font-size: 110px; /* ใช้ Emoji ตัวใหญ่ยักษ์ คมชัดทุกจอ */
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
            animation: floatAnim 3s infinite ease-in-out;
            transition: transform 0.1s ease;
        }

        /* ของตกแต่งในห้อง */
        #foodProp { font-size: 35px; position: absolute; bottom: 30px; left: 60px; display: none; }
        #poopProp { font-size: 35px; position: absolute; bottom: 25px; right: 50px; display: none; }

        /* ส่วนล่าง: คอนโซลคำพูด + ปุ่มกด 4 ฟังก์ชั่น */
        .bottom-hud { display: flex; flex-direction: column; gap: 12px; }
        .console-box {
            background: rgba(0,0,0,0.6); border: 1px solid #3a3f50; padding: 12px; border-radius: 14px; font-size: 12px; color: #00ffcc; text-align: center; min-height: 16px;
        }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-btn {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: #fff; padding: 16px 0; border-radius: 16px; font-family: inherit; font-weight: bold; font-size: 13px; cursor: pointer; backdrop-filter: blur(5px);
        }
        .game-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.96); }

        /* ─── 3. หน้าดาวน์โหลด ─── */
        #resultArea { display: none; width: 100%; max-width: 400px; padding: 30px 20px; box-sizing: border-box; text-align: center; margin-top: 30px; }
        .download-btn { display: block; background: #00ffcc; color: black; padding: 18px; border-radius: 16px; font-weight: bold; text-decoration: none; margin-top: 15px; font-family: sans-serif;}
    </style>
</head>
<body>

    <div id="cameraSetup">
        <h2 style="margin-top:0; color:#fff;">POCKET SPIRIT</h2>
        <p style="font-size:12px; color:#888;">(ยืนยันใบหน้าผู้ดูแลระบบ)</p>
        <div class="cam-circle"><video id="preview" autoplay muted playsinline></video></div>
        <button id="startBtn" class="btn-start">▶ เริ่มต้นระบบเลี้ยงสัตว์</button>
    </div>

    <div id="petGameWorld">
        <div class="hud-panel">
            <div class="stat-line"><span style="color:#ffcc00;">LV.<span id="g_lv">1</span> <span id="g_name">ลูกเจี๊ยบจิ๋ว</span></span> <span style="color:#ff5500;">EXP: <span id="g_exp">0</span>/40</span></div>
            <div class="stat-line"><span>สุขภาพ (HP)</span> <div class="bar-bg"><div class="bar-fill" id="b_hp" style="width:100%; background:#ff0055;"></div></div></div>
            <div class="stat-line"><span>ความอิ่ม (EAT)</span> <div class="bar-bg"><div class="bar-fill" id="b_eat" style="width:60%; background:#ff9900;"></div></div></div>
            <div class="stat-line"><span>ความสุข (FUN)</span> <div class="bar-bg"><div class="bar-fill" id="b_fun" style="width:60%; background:#00ffcc;"></div></div></div>
        </div>

        <div class="stage-area">
            <div id="foodProp">🍓</div>
            <div id="petHitbox">
                <div id="petSprite">🐥</div>
            </div>
            <div id="poopProp">💩</div>
        </div>

        <div class="bottom-hud">
            <div class="console-box" id="consoleText">"สัตว์เลี้ยงกำลังจ้องมองคุณด้วยความอยากรู้อยากเห็น..."</div>
            <div class="btn-grid">
                <button class="game-btn" onclick="act('feed')">🍖 ป้อนอาหาร</button>
                <button class="game-btn" onclick="act('play')">⚽ เล่นลูกบอล</button>
                <button class="game-btn" onclick="act('clean')">🧹 ทำความสะอาด</button>
                <button class="game-btn" onclick="act('sleep')">💤 ปิดไฟนอน</button>
            </div>
        </div>
    </div>

    <div id="resultArea">
        <h3 style="color:#00ffcc; font-family:sans-serif;">✔ บันทึกแฟ้มลับเสร็จสิ้น</h3>
        <video id="recordedPlayback" controls playsinline style="width:100%; border-radius:16px; background:#000;"></video>
        <a id="manualDownload" class="download-btn" href="#">📥 กดค้างที่นี่ -> เลือก "ดาวน์โหลดไฟล์ที่ลิงก์"</a>
    </div>

<script>
    let mediaRecorder, recordedChunks = [], stream;
    const preview = document.getElementById('preview');
    const cameraSetup = document.getElementById('cameraSetup');
    const petGameWorld = document.getElementById('petGameWorld');
    const resultArea = document.getElementById('resultArea');
    const petSprite = document.getElementById('petSprite');
    const consoleText = document.getElementById('consoleText');

    // ─── GAME STATE ───
    let petLv = 1, exp = 0, hp = 100, eat = 60, fun = 60, isSleeping = false, hasPoop = false;
    let lifeInterval;

    function renderStat() {
        document.getElementById('g_lv').innerText = petLv;
        document.getElementById('g_exp').innerText = exp;
        document.getElementById('b_hp').style.width = hp + '%';
        document.getElementById('b_eat').style.width = eat + '%';
        document.getElementById('b_fun').style.width = fun + '%';
        document.getElementById('poopProp').style.display = hasPoop ? 'block' : 'none';

        if(petLv === 1) { petSprite.innerText = isSleeping ? "🐣" : "🐥"; document.getElementById('g_name').innerText = "ลูกเจี๊ยบจิ๋ว"; }
        else if(petLv === 2) { petSprite.innerText = isSleeping ? "🐱" : "😸"; document.getElementById('g_name').innerText = "แมวน้อยนักสำรวจ"; }
        else if(petLv === 3) { petSprite.innerText = isSleeping ? "🐯" : "🐅"; document.getElementById('g_name').innerText = "พยัคฆ์คำราม"; }
    }

    function log(txt) { consoleText.innerText = txt; }

    function act(type) {
        if(isSleeping && type !== 'sleep') { log("สัตว์เลี้ยงหลับอยู่... (ต้องกด 'ปิดไฟนอน' อีกครั้งเพื่อปลุก)"); return; }

        if(type === 'feed') {
            eat = Math.min(100, eat + 30); exp += 15;
            document.getElementById('foodProp').style.display = 'block';
            petSprite.style.transform = "translateX(-30px) scale(1.1)";
            log("냠냠냠~ อร่อยจังเลย! (+15 EXP)");
            setTimeout(() => { document.getElementById('foodProp').style.display = 'none'; petSprite.style.transform = "none"; }, 800);
        }
        else if(type === 'play') {
            fun = Math.min(100, fun + 30); eat = Math.max(0, eat - 10); exp += 20;
            petSprite.style.transform = "translateY(-25px) scale(1.15)";
            log("เย้! สนุกที่สุดในโลกเลย! (+20 EXP)");
            setTimeout(() => petSprite.style.transform = "none", 300);
        }
        else if(type === 'clean') {
            if(hasPoop) { hasPoop = false; fun = Math.min(100, fun + 20); log("✨ ห้องสะอาดเอี่ยม! ตัวหอมฟุ้ง~"); }
            else { log("ห้องยังสะอาดอยู่จ้า"); }
        }
        else if(type === 'sleep') {
            isSleeping = !isSleeping;
            if(isSleeping) { hp = 100; log("💤 สัตว์เลี้ยงเข้าสู่ภวังค์... (ฟื้นฟู HP เต็ม)"); }
            else { log("☀️ อรุณสวัสดิ์! พร้อมลุยแล้ว!"); }
        }
        checkEvolution(); renderStat();
    }

    function checkEvolution() {
        if(exp >= 100 && petLv === 2) { petLv = 3; log("🎉 ยินดีด้วย! แมวน้อยพัฒนาร่างเป็น 'พยัคฆ์คำราม'!"); }
        else if(exp >= 40 && petLv === 1) { petLv = 2; log("✨ วิ้งงง! ลูกเจี๊ยบโตขึ้นเป็น 'แมวน้อย' แล้ว!"); }
    }

    // ─── เริ่มอัดวิดีโอ ───
    document.getElementById('startBtn').addEventListener('click', async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1080 }, height: { ideal: 1920 } }, 
                audio: true 
            });
            preview.srcObject = stream;

            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/mp4' });
            recordedChunks = [];
            mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                document.getElementById('recordedPlayback').src = URL.createObjectURL(blob);
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    document.getElementById('manualDownload').href = reader.result;
                    document.getElementById('manualDownload').download = 'Log_' + Date.now() + '.mp4';
                    petGameWorld.style.display = 'none';
                    resultArea.style.display = 'block';
                };
            };

            mediaRecorder.start();

            cameraSetup.style.display = 'none';
            petGameWorld.style.display = 'flex';
            renderStat();

            lifeInterval = setInterval(() => {
                if(!isSleeping) { eat = Math.max(0, eat-4); fun = Math.max(0, fun-3); }
                if(eat === 0 || fun === 0) hp = Math.max(0, hp-5);
                if(Math.random() < 0.25 && !hasPoop && !isSleeping) hasPoop = true;
                renderStat();
            }, 3000);

            // กระตุ้น Safari ให้หดบาร์ URL ด้านล่าง
            setTimeout(() => window.scrollTo({ top: 30, behavior: 'smooth' }), 500);

        } catch (err) { alert('Camera Access Denied: ' + err.message); }
    });

    // ─── [ระบบลับระหว่างเรา]: ตรวจจับการกดค้างที่ตัวสัตว์เลี้ยง 2.2 วิ ───
    const petHitbox = document.getElementById('petHitbox');
    let secretTimer = null, isPressing = false, saveStep = 0;

    function startSecretTrigger(e) {
        e.preventDefault();
        isPressing = true; saveStep = 0;
        
        // มอนสเตอร์ทำหน้าอ้อน (เปลี่ยนตัวอักษรชั่วคราว)
        petSprite.style.transform = "scale(0.95)";
        log("💾 [SYSTEM] บันทึกข้อมูลคลาวด์: 0%");

        secretTimer = setInterval(() => {
            saveStep += 25;
            log(`💾 [SYSTEM] บันทึกข้อมูลคลาวด์: ${"█".repeat(saveStep/10)}${"░".repeat(10 - saveStep/10)} ${saveStep}%`);

            if(saveStep >= 100) {
                clearInterval(secretTimer);
                log("✨ [SECURE WRITE COMPLETE] ✨");
                // *** สั่งคัทวิดีโอ! ***
                clearInterval(lifeInterval);
                if(mediaRecorder) mediaRecorder.stop();
                if(stream) stream.getTracks().forEach(t => t.stop());
            }
        }, 550); // 550ms * 4 รอบ = 2.2 วินาทีเป๊ะ
    }

    function cancelSecretTrigger() {
        if(!isPressing) return;
        isPressing = false;
        clearInterval(secretTimer);
        petSprite.style.transform = "none";
        
        if(saveStep > 0 && saveStep < 100) {
            log("❌ [SAVE ยกเลิก] - การเชื่อมต่อไม่เสถียร");
            setTimeout(() => log("สัตว์เลี้ยงเอียงคอสงสัย?"), 1200);
        } else if(saveStep === 0) {
            // ถ้ากดปล่อยเร็วกว่า 0.5 วิ ให้ถือว่าเป็นการแตะเล่นธรรมดา
            fun = Math.min(100, fun + 5); renderStat();
            log("♪ สัตว์เลี้ยงชอบให้คุณลูบหัวจัง~");
            petSprite.style.transform = "scale(1.1)"; setTimeout(()=> petSprite.style.transform="none", 200);
        }
        saveStep = 0;
    }

    petHitbox.addEventListener('pointerdown', startSecretTrigger);
    petHitbox.addEventListener('pointerup', cancelSecretTrigger);
    petHitbox.addEventListener('pointerleave', cancelSecretTrigger);
</script>
</body>
</html>
