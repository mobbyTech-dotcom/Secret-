<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recorder (iOS 12 Edition - V3)</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        video {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
            margin-bottom: 20px;
            max-height: 60vh;
        }
        .controls button {
            padding: 12px 20px;
            margin: 5px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #startBtn { background-color: #4CAF50; color: white; }
        #stopBtn { background-color: #f44336; color: white; display: none; }
        #blackScreenBtn { background-color: #2196F3; color: white; display: none; }

        #blackOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 9999;
        }

        #resultArea {
            display: none;
            margin-top: 15px;
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
        }
        #resultArea p { margin: 5px 0; font-size: 13px; color: #4CAF50;}
    </style>
</head>
<body>

<div class="container">
    <h2>เครื่องมือบันทึกวิดีโอ</h2>
    <video id="preview" autoplay muted playsinline></video>
    
    <div class="controls">
        <button id="startBtn">▶ เริ่มบันทึก</button>
        <button id="blackScreenBtn">⬛ จอดำ</button>
        <button id="stopBtn">⏹ หยุด</button>
    </div>

    <div id="resultArea">
        <p>✔ บันทึกเสร็จสิ้น! (กดค้างที่คลิปด้านล่างเพื่อ Save ลงเครื่อง)</p>
        <video id="recordedPlayback" controls playsinline></video>
    </div>
</div>

<div id="blackOverlay"></div>

<script>
    var mediaRecorder;
    var recordedChunks = [];
    var stream;
    var wakeLock = null;
    var holdTimer = null;

    var preview = document.getElementById('preview');
    var recordedPlayback = document.getElementById('recordedPlayback');
    var resultArea = document.getElementById('resultArea');
    var startBtn = document.getElementById('startBtn');
    var stopBtn = document.getElementById('stopBtn');
    var blackScreenBtn = document.getElementById('blackScreenBtn');
    var blackOverlay = document.getElementById('blackOverlay');

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator && navigator.wakeLock) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) {}
    }

    function releaseWakeLock() {
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
    }

    document.addEventListener('visibilitychange', async function() {
        if (document.visibilityState === 'visible' && mediaRecorder && mediaRecorder.state === 'recording') {
            await requestWakeLock();
        }
    });

    function enterBlackScreen() {
        preview.style.opacity = '0';
        blackOverlay.style.display = 'block';
    }

    function exitBlackScreen() {
        preview.style.opacity = '1';
        blackOverlay.style.display = 'none';
    }

    // ── เริ่มบันทึก ────────────────────────────────────
    startBtn.addEventListener('click', async function() {
        if (typeof MediaRecorder === 'undefined') {
            alert('ไม่รองรับ MediaRecorder! \nกรุณาไปที่ Settings -> Safari -> Advanced -> Experimental Features แล้วเปิด "MediaRecorder"');
            return;
        }

        try {
            resultArea.style.display = 'none';
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" },
                audio: true
            });

            preview.srcObject = stream;

            var options = {};
            var extension = 'mp4';
            
            // [จุดที่แก้ไข] เช็คอย่างปลอดภัยว่ามีฟังก์ชั่น isTypeSupported ให้ใช้หรือไม่
            if (typeof MediaRecorder.isTypeSupported === 'function') {
                if (MediaRecorder.isTypeSupported('video/mp4')) {
                    options = { mimeType: 'video/mp4' };
                } else if (MediaRecorder.isTypeSupported('video/webm')) {
                    options = { mimeType: 'video/webm' }; extension = 'webm';
                }
            } 
            // ถ้าไม่มี (iPhone 5s จะตกมาเข้าเงื่อนไขนี้) options จะเป็น {} ว่างๆ 
            // ซึ่ง Safari จะยอมบันทึกเป็นฟอร์แมตมาตรฐานของมันเอง (H.264/MP4) โดยไม่ Error

            mediaRecorder = new MediaRecorder(stream, options);
            recordedChunks = [];

            mediaRecorder.ondataavailable = function(e) {
                if (e.data && e.data.size > 0) {
                    recordedChunks.push(e.data);
                }
            };

            mediaRecorder.onstop = function() {
                var blob = new Blob(recordedChunks, { type: options.mimeType || 'video/mp4' });
                var url = URL.createObjectURL(blob);
                
                var a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'Record_' + Date.now() + '.' + extension;
                document.body.appendChild(a);
                a.click();
                setTimeout(function() { document.body.removeChild(a); }, 100);

                recordedPlayback.src = url;
                resultArea.style.display = 'block';
            };

            // [จุดที่แก้ไข] เอาตัวเลข (1000) ออก เพื่อไม่ให้ iOS 12 บันทึกไฟล์เสีย
            mediaRecorder.start();
            await requestWakeLock();

            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            blackScreenBtn.style.display = 'inline-block';

            setTimeout(function() { enterBlackScreen(); }, 3000);

        } catch (err) {
            alert('ไม่สามารถเปิดกล้องได้: ' + err.message);
        }
    });

    // ── หยุดบันทึก ─────────────────────────────────────
    stopBtn.addEventListener('click', function() {
        exitBlackScreen();
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
        if (stream) {
            stream.getTracks().forEach(function(t) { t.stop(); });
        }
        releaseWakeLock();

        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        blackScreenBtn.style.display = 'none';
    });

    blackScreenBtn.addEventListener('click', function() { enterBlackScreen(); });

    function startHold(e) {
        clearTimeout(holdTimer);
        holdTimer = setTimeout(function() { exitBlackScreen(); }, 2000);
    }

    function endHold(e) {
        clearTimeout(holdTimer);
    }

    blackOverlay.addEventListener('touchstart', startHold, { passive: true });
    blackOverlay.addEventListener('touchend', endHold);
    blackOverlay.addEventListener('touchcancel', endHold);

    blackOverlay.addEventListener('mousedown', startHold);
    blackOverlay.addEventListener('mouseup', endHold);
    blackOverlay.addEventListener('mouseleave', endHold);
</script>
</body>
</html>
