<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recorder (Safari Stealth Mode)</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 0; padding: 0;
            background-color: #000000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* จงใจตั้งให้ยาว 115vh เพื่อให้ 'ไถจอลง' เพื่อซ่อนบาร์ Safari ได้ */
            min-height: 115vh; 
            overflow-x: hidden;
        }
        .container {
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-top: 10px;
        }
        video {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
            margin-bottom: 15px;
            max-height: 50vh;
        }
        .controls button {
            padding: 12px 20px;
            margin: 5px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #startBtn { background-color: #4CAF50; color: white; }
        #stopBtn { background-color: #f44336; color: white; display: none; }
        #blackScreenBtn { background-color: #2196F3; color: white; display: none; }

        /* แผ่นจอดำ กางเผื่อความสูงไป 130% กันขอบล่างโหว่ตอน Safari หดบาร์ */
        #blackOverlay {
            display: none;
            position: fixed;
            top: -20px; left: 0;
            width: 100vw; height: 130vh; 
            background-color: #000;
            z-index: 99999;
        }

        #resultArea {
            display: none;
            margin-top: 15px;
            background: #1f1f1f;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        #resultArea p { margin: 0 0 10px 0; font-size: 14px; color: #4CAF50;}
        .download-btn {
            display: inline-block;
            background: #ff9800;
            color: black;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
        }
        .scroll-tip {
            color: #ffeb3b;
            font-size: 13px;
            margin-bottom: 10px;
            border: 1px dashed #ffeb3b;
            padding: 8px;
            border-radius: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="scroll-tip">💡 <b>เทคนิค:</b> ใช้นิ้วไถหน้าจอลงนิดนึงให้แถบ Safari หายไปก่อน ค่อยกดเริ่มอัด</div>
    
    <h2>เครื่องมือบันทึกวิดีโอ</h2>
    <video id="preview" autoplay muted playsinline></video>
    
    <div class="controls">
        <button id="startBtn">▶ เริ่มบันทึก</button>
        <button id="blackScreenBtn">⬛ จอดำ</button>
        <button id="stopBtn">⏹ หยุด</button>
    </div>

    <div id="resultArea">
        <p>✔ บันทึกเสร็จสิ้น!</p>
        <video id="recordedPlayback" controls playsinline></video>
        <br>
        <a id="manualDownload" class="download-btn" href="#">📥 กดค้างที่นี่ -> เลือก "ดาวน์โหลดไฟล์ที่ลิงก์"</a>
    </div>
</div>

<div id="blackOverlay"></div>

<script>
    var mediaRecorder, recordedChunks = [], stream, wakeLock = null, holdTimer = null;
    var preview = document.getElementById('preview');
    var recordedPlayback = document.getElementById('recordedPlayback');
    var resultArea = document.getElementById('resultArea');
    var manualDownload = document.getElementById('manualDownload');
    var startBtn = document.getElementById('startBtn');
    var stopBtn = document.getElementById('stopBtn');
    var blackScreenBtn = document.getElementById('blackScreenBtn');
    var blackOverlay = document.getElementById('blackOverlay');

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator && navigator.wakeLock) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    }
    function releaseWakeLock() { if (wakeLock) { wakeLock.release(); wakeLock = null; } }

    function enterBlackScreen() {
        preview.style.opacity = '0';
        blackOverlay.style.display = 'block';
    }
    function exitBlackScreen() {
        preview.style.opacity = '1';
        blackOverlay.style.display = 'none';
    }

    startBtn.addEventListener('click', async function() {
        try {
            resultArea.style.display = 'none';
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            preview.srcObject = stream;

            var options = {};
            if (typeof MediaRecorder.isTypeSupported === 'function' && MediaRecorder.isTypeSupported('video/mp4')) {
                options = { mimeType: 'video/mp4' };
            } 

            mediaRecorder = new MediaRecorder(stream, options);
            recordedChunks = [];

            mediaRecorder.ondataavailable = function(e) { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = function() {
                var blob = new Blob(recordedChunks, { type: 'video/mp4' });
                var tempUrl = URL.createObjectURL(blob);
                recordedPlayback.src = tempUrl;

                var reader = new FileReader();
                reader.readAsDataURL(blob); 
                reader.onloadend = function() {
                    manualDownload.href = reader.result;
                    manualDownload.download = 'Record_' + Math.floor(Date.now()/1000) + '.mp4';
                    resultArea.style.display = 'block';
                    window.scrollTo(0, document.body.scrollHeight);
                };
            };

            mediaRecorder.start();
            await requestWakeLock();

            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            blackScreenBtn.style.display = 'inline-block';

            setTimeout(function() { enterBlackScreen(); }, 3000);

        } catch (err) { alert('ไม่สามารถเปิดกล้องได้: ' + err.message); }
    });

    stopBtn.addEventListener('click', function() {
        exitBlackScreen();
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
        releaseWakeLock();

        startBtn.style.display = 'inline-block';
        stopBtn.style.display = 'none';
        blackScreenBtn.style.display = 'none';
    });

    blackScreenBtn.addEventListener('click', function() { enterBlackScreen(); });

    function startHold() { clearTimeout(holdTimer); holdTimer = setTimeout(function() { exitBlackScreen(); }, 2000); }
    function endHold() { clearTimeout(holdTimer); }

    blackOverlay.addEventListener('touchstart', startHold, { passive: true });
    blackOverlay.addEventListener('touchend', endHold);
    blackOverlay.addEventListener('touchcancel', endHold);
</script>
</body>
</html>
